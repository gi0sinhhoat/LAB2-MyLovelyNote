<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="../images/favicon.png" type="../image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700&display=swap" rel="stylesheet">
    <title>MyLovelyNote</title>
    
    <!-- Tích hợp Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="glass">
        <a class="logo">💖 MyLovelyNote </a>
        
        <div class="auth-actions">
            <span id="userEmail" class="user-email" style="display: none;"></span>
            
            <button class="button" id="loginBtn">Đăng nhập</button>
            <button class="button btn-danger" id="logoutBtn" style="display: none;">Đăng xuất</button>
            <button class="button" id="openModal" style="display: none;">Đăng bài</button>
        </div>
    </header>

    <div id="list">
        <p style="text-align: center;">Đang tải dữ liệu...</p>
    </div>

    <!-- Modal tạo ghi chú -->
    <div class="modal" id="modal">
        <div class="modal-inner">
            <h2>Tạo ghi chú</h2>
            <div class="form-group">
                <label for="titleInput">Tiêu đề</label>
                <input type="text" id="titleInput" placeholder="Nhập tiêu đề...">
            </div>
            <div class="form-group">
                <label for="contentInput">Nội dung</label>
                <textarea id="contentInput" rows="8" placeholder="Nhập nội dung..."></textarea>
            </div>
            <div class="modal-actions">
                <button class="btn-submit" id="submitModal">ĐĂNG</button>
                <button class="btn-close" id="closeModal">ĐÓNG</button>
            </div>
        </div>
    </div>

    <!-- Modal xem nội dung -->
    <div class="modal" id="viewModal">
        <div class="modal-inner">
            <h2 id="viewModalTitle"></h2>
            <div id="viewModalContent"></div>
            <div class="modal-actions">
                <button class="btn-close" id="closeViewModal" style="flex: unset; padding: 11px 28px;">ĐÓNG</button>
            </div>
        </div>
    </div>  

    <script src="script.js"></script>
</body>
</html>
